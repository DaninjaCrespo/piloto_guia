<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia Detetive - Paranapiacaba</title>
    <style>
        /* Estética "Noir Victorian" - Custo Zero de Design */
        body {
            background-color: #121212;
            color: #d4af37; /* Dourado envelhecido */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            background-image: radial-gradient(circle, #1a1a1a 0%, #0a0a0a 100%);
        }

        .container {
            max-width: 400px;
            border: 2px solid #3a3010;
            padding: 30px;
            background-color: #171717;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            border-radius: 8px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid #3a3010;
            padding-bottom: 15px;
        }

        p {
            color: #b0b0b0;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn {
            background-color: #3a3010;
            color: #d4af37;
            border: 1px solid #d4af37;
            padding: 15px 30px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
            width: 100%;
            box-sizing: border-box;
            border-radius: 4px;
        }

        .btn:hover {
            background-color: #d4af37;
            color: #121212;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .footer {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Guia Detetive</h1>
        <p>A névoa encobre segredos antigos nos trilhos de Paranapiacaba. Você está prestes a iniciar uma investigação que mudará o destino desta vila.</p>
        
        <!-- Botão que inicia a nossa jornada -->
        <button class="btn" onclick="iniciarInvestigacao()">Iniciar Investigação</button>
        
        <div class="footer">SISTEMA DE INVESTIGAÇÃO AUTOMATO v1.0</div>
    </div>

    <script>
        // Lógica inicial do nosso jogo de duas pessoas
        function iniciarInvestigacao() {
            alert("A névoa se aproxima... Iniciando o Ato Demo: O Prólogo!");
            // Aqui nas próximas etapas nós vamos fazer a tela mudar para a primeira pista!
        }
    </script>

</body>
</html>
