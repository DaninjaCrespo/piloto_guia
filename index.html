<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia Detetive | Motor de Névoa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        
        <h1>Rastreador de Anomalias</h1>
        <p class="instruction">O perímetro está bloqueado por interferência. Desloque-se para os pontos de energia para dissipar a névoa.</p>

        <!-- O MAPA COM A NÉVOA DE GUERRA -->
        <div class="fog-container">
            <!-- Sua imagem de fundo exata -->
            <img src="assets/image_6749c7.jpg" id="mapa-fundo" class="mapa-fundo" alt="Mapa Parte Baixa">
            <!-- A lona onde a névoa será desenhada e apagada -->
            <canvas id="fog-canvas" class="fog-canvas"></canvas>
        </div>

        <p id="status-missao" class="morse-tip">Sinal Detectado: Largo dos Padeiros (Ponto 7).</p>

        <!-- BOTÕES SIMULANDO OS GATILHOS DO GPS -->
        <div class="radar-points">
            <button id="btn-lyra" class="btn btn-radio" onclick="ativarGatilho('lyra')">📍 Chegar no Clube Lyra (15)</button>
            <button id="btn-mercado" class="btn btn-radio" onclick="ativarGatilho('mercado')">📍 Chegar no Mercado (17)</button>
            <button id="btn-fox" class="btn btn-radio" onclick="ativarGatilho('fox')">📍 Chegar na Casa Fox (11)</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
